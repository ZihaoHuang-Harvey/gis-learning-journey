<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的GIS学习主页</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background-color: #f0f2f5;
            color: #333;
        }
        nav {
            background: #2c5aa0;
            padding: 15px;
            text-align: center;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            font-size: 16px;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .container {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .card {
            background: white;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        h1 { color: #2c5aa0; margin-bottom: 10px; }
        h2 { color: #444; margin-bottom: 15px; font-size: 20px; }
        p { line-height: 1.8; color: #555; margin-bottom: 10px; }
        button {
            background: #2c5aa0;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
        }
        button:hover {
            background: #1e3d6f;
        }
        ul { padding-left: 20px; }
        li { line-height: 2; color: #555; }
    </style>
</head>
<body>
    <nav>
        <a href="#">首页</a>
        <a href="#">项目</a>
        <a href="#">关于我</a>
    </nav>

    <div class="container">
        <div class="card">
            <h1>你好，GIS世界</h1>
            <p>我是测绘工程专业的学生，正在学习GIS开发。</p>
            <p>今天是2026年4月25日，我开始了GIS开发的学习之旅。</p>
        </div>

        <div class="card">
            <h2>我的学习目标</h2>
            <ul>
                <li>掌握WebGIS开发</li>
                <li>做出酷酷的可视化项目</li>
                <li>找到满意的实习</li>
            </ul>
        </div>

        <div class="card">
            <h2>关于我</h2>
            <p>测绘工程大四学生，即将攻读地信遥感硕士。热爱地图与编程。</p>
            <button onclick="showMessage()">点我一下</button>
            <p id="message" style="margin-top:15px; color:#2c5aa0; font-weight:bold;"></p>
        </div>
    </div>

    <script>
        function showMessage() {
            document.getElementById('message').innerText = '恭喜你，第一个交互生效了！继续加油！';
            console.log('按钮被点击了');
        }
    </script>
</body>
</html>
