<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的第一张地图</title>
    <!-- 引入 OpenLayers 样式 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@8.2.0/ol.css">
    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100%; height: 100vh; }
        #info {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(255,255,255,0.95);
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            z-index: 1000;
            font-family: "Microsoft YaHei", sans-serif;
        }
        #info h3 { margin: 0 0 8px 0; color: #2c5aa0; }
        #info p { margin: 4px 0; font-size: 14px; color: #555; }
        #coords { color: #d9534f; font-weight: bold; margin-top: 8px; }
    </style>
</head>
<body>
    <div id="info">
        <h3>🗺️ 我的第一张地图</h3>
        <p>鼠标点击地图查看坐标</p>
        <p id="coords">坐标：请点击地图</p>
    </div>
    <div id="map"></div>

    <!-- 引入 OpenLayers -->
    <script src="https://cdn.jsdelivr.net/npm/ol@8.2.0/dist/ol.js"></script>
    <script>
        // 创建地图
        let map = new ol.Map({
            target: 'map',  // 显示在哪个div里
            layers: [
                // 添加 OpenStreetMap 底图
                new ol.layer.Tile({
                    source: new ol.source.OSM()
                })
            ],
            view: new ol.View({
                center: ol.proj.fromLonLat([116.4074, 39.9042]), // 北京天安门
                zoom: 12
            })
        });
        
        // 点击事件：显示经纬度
        map.on('click', function(event) {
            let coordinate = ol.proj.toLonLat(event.coordinate);
            let lon = coordinate[0].toFixed(4);
            let lat = coordinate[1].toFixed(4);
            document.getElementById('coords').innerText = '坐标：' + lon + '°E, ' + lat + '°N';
            console.log('点击坐标：', lon, lat);
        });
    </script>
</body>
</html>
